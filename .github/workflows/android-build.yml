name: Android CI Build

# 1. This tells GitHub WHEN to run the build (every time you push to the 'main' branch)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. This defines WHAT it actually does
jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # Step A: Grab your code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Set up the Java environment required for Android
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step C: Grant execute permissions to the Gradle wrapper (fixes a common bug)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step D: Actually build the app using Gradle!
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # Step E: Take the finished .apk and upload it so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
