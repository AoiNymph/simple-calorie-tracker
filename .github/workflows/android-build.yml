name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Master Signature
        id: signature-cache
        uses: actions/cache@v4
        with:
          path: macro-tracker.keystore
          key: macro-tracker-master-key-v1

      - name: Forge Permanent Key
        if: steps.signature-cache.outputs.cache-hit != 'true'
        run: keytool -genkey -v -keystore macro-tracker.keystore -storepass password123 -alias macrokey -keypass password123 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=CalorieTracker, O=SoloDev, C=US"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build App
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
